name: pqc_secure_transfer
description: PQC Secure File Transfer App
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.4
  google_fonts: ^8.0.2
  lottie: ^3.3.2
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  # required for Cupertino icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
