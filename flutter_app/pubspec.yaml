name: pqc_secure_transfer
description: PQC Secure File Transfer App
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.3.3
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  file_picker: ^8.0.0
  permission_handler: ^11.0.1
  # required for Cupertino icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
